<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="FastFile — Hébergez, gérez et partagez vos fichiers en toute sécurité.">
    <title>{% block title %}FastFile{% endblock %}</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='img/logo.svg') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block head %}{% endblock %}
</head>
<body>
    {% if error_code %}
    <div class="error-page">
        <div class="error-card glass">
            <span class="error-code">{{ error_code }}</span>
            <p class="error-msg">{{ error_message }}</p>
            <a href="{{ url_for('index') }}" class="btn btn-primary">Retour à l'accueil</a>
        </div>
    </div>
    {% else %}
    {% block content %}{% endblock %}
    {% endif %}

    {% block scripts %}{% endblock %}
</body>
</html>
